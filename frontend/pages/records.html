<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('gs_theme')||'light')</script>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>GlucoSense — Assessment History</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/css/global.css"/>
  <style>
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 22px;transition:border-color .2s,box-shadow .2s,transform .2s,background .25s}
    .stat-card:hover{border-color:var(--muted2);box-shadow:0 4px 16px var(--shadow);transform:translateY(-1px)}
    .stat-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
    .stat-icon.blue{background:rgba(14,165,233,.1);color:#0ea5e9}
    .stat-icon.green{background:rgba(16,185,129,.1);color:#10b981}
    .stat-icon.amber{background:rgba(245,158,11,.1);color:#f59e0b}
    .stat-icon.red{background:rgba(239,68,68,.1);color:#ef4444}
    .stat-val{font-family:'Syne',sans-serif;font-size:1.65rem;font-weight:800;line-height:1;color:var(--text);margin-bottom:4px}
    .stat-lbl{font-size:.75rem;color:var(--muted2);font-weight:500}
    .four-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;transition:background .25s,border-color .25s}
    .btn-primary{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;background:linear-gradient(135deg,#0284c7,#0ea5e9);color:#ffffff;font-size:.83rem;font-weight:700;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;box-shadow:0 2px 6px rgba(14,165,233,.2)}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(14,165,233,.3)}
    .btn-ghost{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;background:var(--subtle);border:1px solid var(--border);color:var(--text2);font-size:.82rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
    .btn-ghost:hover{background:var(--hover);color:var(--text);border-color:var(--muted2)}
    .btn-ghost:disabled{opacity:.4;cursor:not-allowed}
    .filter-btn{padding:6px 14px;border-radius:20px;font-size:.8rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .2s}
    .filter-btn:hover{border-color:rgba(14,165,233,.3);color:#0ea5e9}
    .filter-btn.active{background:rgba(14,165,233,.08);color:#0ea5e9;border-color:rgba(14,165,233,.2)}
    .btn-danger{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:7px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);color:#ef4444;font-size:.78rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
    .btn-danger:hover{background:rgba(239,68,68,.12)}
    table{width:100%;border-collapse:collapse}
    thead th{background:var(--subtle);padding:11px 16px;text-align:left;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2);border-bottom:1px solid var(--border);white-space:nowrap}
    tbody td{padding:13px 16px;border-bottom:1px solid var(--border-sub);color:var(--text2);font-size:.855rem}
    tbody tr:last-child td{border-bottom:none}
    tbody tr:hover td{background:var(--hover);color:var(--text)}
    @media(max-width:1100px){.four-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:640px){.four-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar"></aside>
  <div class="main-wrap">

    <header class="topbar">
      <div style="flex:1">
        <div class="topbar-title">Assessment History</div>
        <div class="topbar-sub">Complete longitudinal record of your risk assessments</div>
      </div>
      <button class="btn-ghost" onclick="exportCSV()" style="margin-right:8px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV
      </button>
      <button class="btn-primary" onclick="location.href='assessment.html'">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Assessment
      </button>
    </header>

    <main style="padding:28px 32px;flex:1">

      <div class="four-grid" style="margin-bottom:24px">
        <div class="stat-card">
          <div class="stat-icon blue"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
          <div class="stat-val" id="r-total">—</div><div class="stat-lbl">Total Assessments</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
          <div class="stat-val" id="r-avg">—</div><div class="stat-lbl">Average Risk Score</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon amber"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
          <div class="stat-val" id="r-latest">—</div><div class="stat-lbl">Latest Risk Level</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon red"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
          <div class="stat-val" id="r-high">—</div><div class="stat-lbl">High Risk Events</div>
        </div>
      </div>

      <div class="card">
        <div style="padding:16px 20px;border-bottom:1px solid var(--border-sub);display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span style="font-size:.75rem;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;margin-right:4px">Filter:</span>
          <button class="filter-btn active" data-filter="all" onclick="applyFilter('all')">All</button>
          <button class="filter-btn" data-filter="Low" onclick="applyFilter('Low')">Low Risk</button>
          <button class="filter-btn" data-filter="Moderate" onclick="applyFilter('Moderate')">Moderate Risk</button>
          <button class="filter-btn" data-filter="High" onclick="applyFilter('High')">High Risk</button>
        </div>

        <div style="overflow-x:auto">
          <table>
            <thead>
              <tr>
                <th>#</th><th>Date</th><th>Risk Level</th><th>Probability</th>
                <th>Glucose</th><th>BMI</th><th>BP</th><th>Insulin</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="records-body">
              <tr><td colspan="9" style="text-align:center;padding:48px;color:var(--muted2)">
                <div class="spin" style="width:20px;height:20px;border:2px solid var(--border);border-top-color:#0ea5e9;border-radius:50%;margin:0 auto 10px"></div>
                Loading records…
              </td></tr>
            </tbody>
          </table>
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-top:1px solid var(--border-sub)">
          <span style="font-size:.78rem;color:var(--muted2)" id="page-info">—</span>
          <div style="display:flex;gap:6px">
            <button class="btn-ghost" id="btn-prev" onclick="changePage(-1)" disabled>← Previous</button>
            <button class="btn-ghost" id="btn-next" onclick="changePage(1)" disabled>Next →</button>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>
<div id="toast-container"></div>
<script src="../components/api.js"></script>
<script>
  Auth.requireAuth();
  buildSidebar("records");
  let currentPage=1, totalPages=1, currentFilter="all", allRecords=[];

  async function loadStats() {
    try {
      const s = await apiFetch("/records/stats");
      document.getElementById("r-total").textContent  = s.total||0;
      document.getElementById("r-avg").textContent    = (s.avg_probability||0)+"%";
      document.getElementById("r-latest").textContent = s.latest_risk||"—";
      document.getElementById("r-high").textContent   = s.high_risk_count||0;
    } catch(e) {}
  }

  async function loadRecords(page=1) {
    const tbody = document.getElementById("records-body");
    tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:48px;color:var(--muted2)"><div class="spin" style="width:20px;height:20px;border:2px solid var(--border);border-top-color:#0ea5e9;border-radius:50%;margin:0 auto 10px"></div>Loading…</td></tr>`;
    try {
      const data = await apiFetch(`/records/?page=${page}&per_page=10`);
      allRecords = data.records||[];
      totalPages = data.pages||1;
      currentPage = data.current_page||1;
      renderTable(allRecords);
      document.getElementById("page-info").textContent = `Page ${currentPage} of ${totalPages} · ${data.total} records`;
      document.getElementById("btn-prev").disabled = currentPage<=1;
      document.getElementById("btn-next").disabled = currentPage>=totalPages;
    } catch(e) {
      tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:48px;color:#ef4444;font-size:.84rem">Failed to load records. Please try again.</td></tr>`;
    }
  }

  function renderTable(records) {
    const tbody = document.getElementById("records-body");
    const filtered = currentFilter==="all" ? records : records.filter(r=>r.risk_level===currentFilter);
    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="9"><div style="text-align:center;padding:60px 20px;color:var(--muted2)"><div style="font-family:'Syne',sans-serif;font-size:.95rem;color:var(--muted);margin-bottom:6px">No records found</div><div style="font-size:.82rem">Run an assessment to see results here</div></div></td></tr>`;
      return;
    }
    const riskColor = { High:"#ef4444", Moderate:"#f59e0b", Low:"#10b981" };
    tbody.innerHTML = filtered.map(r => `
      <tr>
        <td style="font-weight:600;color:var(--text)">#${r.id}</td>
        <td>${formatDate(r.created_at)}</td>
        <td>${riskBadge(r.risk_level)}</td>
        <td style="font-weight:600;color:${riskColor[r.risk_level]||'#10b981'}">${(r.probability*100).toFixed(1)}%</td>
        <td>${r.glucose} <span style="color:var(--muted2);font-size:.75rem">mg/dL</span></td>
        <td>${r.bmi}</td>
        <td>${r.blood_pressure} <span style="color:var(--muted2);font-size:.75rem">mmHg</span></td>
        <td>${r.insulin} <span style="color:var(--muted2);font-size:.75rem">μU/mL</span></td>
        <td>
          <button class="btn-danger" onclick="deleteRecord(${r.id})">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            Delete
          </button>
        </td>
      </tr>`).join("");
  }

  async function deleteRecord(id) {
    if (!confirm("Permanently delete this assessment record?")) return;
    try {
      await apiFetch(`/records/${id}`,{method:"DELETE"});
      Toast.success("Record deleted successfully");
      loadRecords(currentPage); loadStats();
    } catch(e) { Toast.error(e.message); }
  }

  function applyFilter(f) {
    currentFilter = f;
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.toggle("active",b.dataset.filter===f));
    renderTable(allRecords);
  }

  function changePage(dir) {
    const np = currentPage+dir;
    if (np<1||np>totalPages) return;
    loadRecords(np);
  }

  async function exportCSV() {
    try {
      const data = await apiFetch("/records/?page=1&per_page=1000");
      const records = data.records||[];
      if (!records.length) { Toast.info("No records available to export"); return; }
      const headers = ["ID","Date","Risk Level","Probability (%)","Glucose (mg/dL)","BMI","BP (mmHg)","Skin Thickness (mm)","Insulin (μU/mL)","Pregnancies","Pedigree"];
      const rows = records.map(r=>[r.id,new Date(r.created_at).toLocaleDateString("en-GB"),r.risk_level,(r.probability*100).toFixed(1),r.glucose,r.bmi,r.blood_pressure,r.skin_thickness,r.insulin,r.pregnancies,r.diabetes_pedigree]);
      const csv = [headers,...rows].map(row=>row.map(v=>`"${String(v??"").replace(/"/g,'""')}"`).join(",")).join("\r\n");
      const blob = new Blob([csv],{type:"text/csv"});
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href=url; a.download=`GlucoSense_Records_${new Date().toISOString().split("T")[0]}.csv`; a.click();
      URL.revokeObjectURL(url);
      Toast.success(`Exported ${records.length} records to CSV`);
    } catch(e) { Toast.error("Export failed"); }
  }

  loadStats(); loadRecords();
</script>
</body>
</html>
